name: Bug report
description: Report a problem with Salbotics File Compressor.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include file type, target size, GUI/CLI path, and exact command when relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Error messages, screenshots, or non-sensitive sample-file details.
